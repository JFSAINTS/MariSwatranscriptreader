<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mari Swa Transcriptos Reader</title>
  <script>
    // Detectar base dinámicamente
    const pathname = window.location.pathname;

    // Si no contiene un punto (no es un archivo), redirigir a index.html
    if (!pathname.includes('.')) {
      // Detectar si estamos en /MariSwatranscriptreader/ o en raíz
      let redirectUrl = '/index.html';
      if (pathname.includes('MariSwatranscriptreader')) {
        redirectUrl = '/MariSwatranscriptreader/index.html';
      }

      // Guardar ruta para que index.html la procese
      sessionStorage.redirect = pathname;
      window.location.href = redirectUrl;
    }
  </script>
</head>
<body>
  <p>Redirigiendo...</p>
</body>
</html>
